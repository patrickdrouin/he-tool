services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-hetool}
      POSTGRES_USER: ${DB_USER:-hetool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hetool} -d ${DB_NAME:-hetool}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hetool}
      DB_USER: ${DB_USER:-hetool}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      WORKERS: ${WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
